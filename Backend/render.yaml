services:
  - type: web
    name: backend-vyn-logistics
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: MONGODB_URL
        sync: false  # Set manually in Render dashboard (contains password)

      - key: MONGODB_DB_NAME
        value: vyn_logistics

      - key: AI_MODEL_URL
        value: https://vyn-logistic-model.onrender.com

      - key: CORS_ORIGINS
        value: '["https://vyn-logistic-vfbt.onrender.com"]'

      - key: JWT_SECRET_KEY
        sync: false

      - key: JWT_ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"

      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "1440"

      - key: RESET_TOKEN_EXPIRE_MINUTES
        value: "30"

      - key: REFRESH_COOKIE_NAME
        value: refresh_token

      - key: COOKIE_SECURE
        value: "true"

      - key: COOKIE_SAMESITE
        value: none

      - key: FRONTEND_URL
        value: https://vyn-logistic-vfbt.onrender.com

      - key: RESEND_API_KEY
        sync: false

      - key: RESEND_FROM_EMAIL
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: PYTHON_VERSION
        value: 3.11.0
